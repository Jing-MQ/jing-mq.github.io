{% raw %}
<head>
  {% include head.html %}
  <style>
    /* 在这里写你的所有自定义样式，下面是给你配好的像素风基础版 */
    body {
      background-color: #fdfdfd !important; /* 主背景：纯白清爽 */
      font-family: "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #333333 !important;
    }

    h1, h2, h3, h4 {
      color: #4a6cf3 !important; /* 标题：清新蓝 */
      font-weight: normal !important;
      letter-spacing: 1px;
    }

    a {
      color: #ff6b8b !important; /* 链接：柔粉 */
      text-decoration: none;
    }

    a:hover {
      color: #f34a6c !important; /* 链接悬停：加深柔粉 */
    }

    .site-header {
      background-color: #e8f4fd !important; /* 顶部栏：浅蓝 */
      border-bottom: 3px solid #4a6cf3 !important;
    }

    .site-footer {
      background-color: #f0f7ff !important; /* 底部栏：淡蓝 */
      border-top: 2px solid #d1e7ff !important;
    }

    .post, .page-content {
      border: 2px solid #d1e7ff !important;
      border-radius: 8px;
      padding: 20px;
    }
  </style>
</head>
{% endraw %}
